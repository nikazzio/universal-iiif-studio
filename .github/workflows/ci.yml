name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    if: |
      github.event_name != 'push' ||
      (
        !contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[skip-release]')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff

    - name: Lint with Ruff
      run: |
        ruff check . --ignore C901,D417

  test:
    # Matrix strategy: run fast and slow test lanes in parallel from a
    # single job definition to avoid setup drift between the two.
    if: |
      github.event_name != 'push' ||
      (
        !contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[skip-release]')
      )
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: fast
            marker: "not slow"
            timeout: 10
          - lane: slow
            marker: "slow"
            timeout: 10
    timeout-minutes: ${{ matrix.timeout }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-timeout pytest-cov

    - name: Run ${{ matrix.lane }} tests
      run: |
        if [ "${{ matrix.lane }}" = "fast" ]; then
          pytest -v --tb=short -m "${{ matrix.marker }}" --cov=src --cov-report=term-missing --cov-report=json:coverage.json
        else
          pytest -v --tb=short -m "${{ matrix.marker }}"
        fi

    - name: Upload coverage artifact
      if: matrix.lane == 'fast'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.json

  coverage-badge:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4

    - name: Download coverage artifact
      uses: actions/download-artifact@v4
      with:
        name: coverage-report

    - name: Update coverage.json and push
      run: |
        if [ -f coverage.json ]; then
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage.json
          if git diff --cached --quiet; then
            echo "No coverage changes to commit"
          else
            git commit -m "chore: update coverage.json [skip ci]"
            git push
          fi
        fi
